<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d2040"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1e35"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(0,245,255,0.08)" stroke-width="0.5">
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/><line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
  </g>
  <!-- Shoulder / body -->
  <ellipse cx="200" cy="440" rx="130" ry="90" fill="#0a1628"/>
  <ellipse cx="200" cy="420" rx="110" ry="70" fill="#0d1f38"/>
  <!-- Neck -->
  <rect x="178" y="290" width="44" height="60" rx="8" fill="#0d2540"/>
  <!-- Head -->
  <ellipse cx="200" cy="240" rx="85" ry="95" fill="url(#face)"/>
  <!-- Cyber face details -->
  <!-- Glowing eyes -->
  <ellipse cx="168" cy="228" rx="14" ry="10" fill="#001a2e"/>
  <ellipse cx="232" cy="228" rx="14" ry="10" fill="#001a2e"/>
  <ellipse cx="168" cy="228" rx="8" ry="6" fill="#00f5ff" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="232" cy="228" rx="8" ry="6" fill="#00f5ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Eye glow rings -->
  <ellipse cx="168" cy="228" rx="12" ry="9" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="232" cy="228" rx="12" ry="9" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <!-- Nose suggestion -->
  <path d="M196 240 L192 265 L200 268 L208 265 L204 240" fill="none" stroke="rgba(0,245,255,0.2)" stroke-width="1"/>
  <!-- Mouth - cyber line -->
  <line x1="178" y1="282" x2="222" y2="282" stroke="#00f5ff" stroke-width="2" opacity="0.6"/>
  <line x1="185" y1="278" x2="215" y2="278" stroke="rgba(0,245,255,0.3)" stroke-width="1"/>
  <!-- Cyber temple implants -->
  <rect x="113" y="215" width="6" height="30" rx="3" fill="#00f5ff" opacity="0.7"/>
  <rect x="281" y="215" width="6" height="30" rx="3" fill="#00f5ff" opacity="0.7"/>
  <circle cx="116" cy="212" r="4" fill="#00f5ff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="284" cy="212" r="4" fill="#00f5ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Forehead circuit lines -->
  <path d="M160 170 L180 170 L185 165 L200 165 L205 170 L240 170" fill="none" stroke="rgba(0,245,255,0.3)" stroke-width="1"/>
  <circle cx="160" cy="170" r="2" fill="#00f5ff" opacity="0.6"/>
  <circle cx="240" cy="170" r="2" fill="#00f5ff" opacity="0.6"/>
  <!-- Hair -->
  <path d="M115 220 Q115 140 200 135 Q285 140 285 220 Q280 170 200 168 Q120 170 115 220Z" fill="#050e1a"/>
  <!-- Collar / jacket -->
  <path d="M100 380 L130 310 L160 340 L200 320 L240 340 L270 310 L300 380Z" fill="#0a1628" stroke="rgba(0,245,255,0.2)" stroke-width="1"/>
  <!-- Jacket accent lines -->
  <line x1="200" y1="320" x2="200" y2="400" stroke="rgba(0,245,255,0.15)" stroke-width="1"/>
  <!-- Hex overlay bottom -->
  <polygon points="200,345 215,353 215,369 200,377 185,369 185,353" fill="none" stroke="rgba(0,245,255,0.3)" stroke-width="1"/>
  <!-- Scan line effect -->
  <rect x="0" y="0" width="400" height="400" fill="url(#scanlines)" opacity="0.05"/>
  <!-- Corner brackets -->
  <path d="M10 10 L10 35 M10 10 L35 10" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M390 10 L390 35 M390 10 L365 10" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M10 390 L10 365 M10 390 L35 390" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M390 390 L390 365 M390 390 L365 390" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.6"/>
  <!-- ID Label -->
  <rect x="140" y="12" width="120" height="18" rx="2" fill="rgba(0,245,255,0.08)" stroke="rgba(0,245,255,0.2)" stroke-width="0.5"/>
  <text x="200" y="25" text-anchor="middle" font-family="monospace" font-size="8" fill="#00f5ff" letter-spacing="2" opacity="0.8">ALEX.DEV // ID-001</text>
</svg>
